<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TIME PLAN">
<meta name="theme-color" content="#ebebe8">
<title>TIME PLAN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#3c3c3c;
    --num:#8a8a8a;
    --line:#b9b9b9;
    --line-soft:#d9d9d9;
    --dot:#cfcfcf;
    --memo:#efeac4;
    --head:#f4f4f4;
    --paper:#ffffff;
    --bg:#ebebe8;
    --sun:#8f2f2f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:'Gaegu','Gowun Dodum',sans-serif;
    color:var(--ink);
    padding:28px 16px 60px;
  }
  .sheet{
    max-width:900px;margin:0 auto;background:var(--paper);
    border:1px solid #d8d8d4;box-shadow:0 2px 14px rgba(0,0,0,.07);
    padding:30px 36px 38px;
  }

  /* ── top bar ── */
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
  .date-label{font-size:26px;font-weight:700;letter-spacing:1px;}
  input[type="date"]{
    font-family:'Gowun Dodum',sans-serif;font-size:15px;border:none;border-bottom:1.5px solid var(--line);
    background:transparent;color:var(--ink);padding:3px 2px;outline:none;cursor:pointer;
  }
  .nav-btn{
    border:1px solid var(--line-soft);background:#fff;border-radius:4px;
    width:28px;height:28px;cursor:pointer;font-size:14px;color:#777;
  }
  .nav-btn:hover{background:var(--head);}
  .today-btn{width:auto;padding:0 12px;font-family:'Gowun Dodum',sans-serif;font-size:13px;}
  .weekdays{margin-left:auto;display:flex;gap:14px;font-size:19px;font-weight:700;letter-spacing:1px;}
  .weekdays span{width:18px;text-align:center;color:#444;transition:.15s;}
  .weekdays span.sun{color:var(--sun);}
  .weekdays span.on{border-bottom:2.5px solid #444;color:#000;}
  .weekdays span.sun.on{border-color:var(--sun);color:var(--sun);}
  .save-state{font-size:12px;font-family:'Gowun Dodum',sans-serif;color:#b5b5b5;min-width:64px;text-align:right;}

  /* ── memo ── */
  .memo{position:relative;margin-bottom:20px;}
  .memo .quote{
    display:flex;align-items:baseline;gap:10px;
    background:var(--memo);padding:10px 14px 0;
    font-family:'Gaegu',sans-serif;font-size:16.5px;color:#6e6a4a;line-height:1.4;
  }
  .memo .quote .q-text{flex:1;}
  .memo .quote .q-author{font-size:13px;color:#a09c78;white-space:nowrap;}
  .memo .quote .q-next{
    border:none;background:none;cursor:pointer;color:#b9b594;font-size:14px;padding:0 2px;
  }
  .memo .quote .q-next:hover{color:#6e6a4a;}
  .memo textarea{
    width:100%;height:72px;background:var(--memo);border:none;resize:vertical;
    padding:12px 14px;font-family:'Gaegu',sans-serif;font-size:17px;line-height:1.5;color:var(--ink);outline:none;
  }
  .memo .tag{
    position:absolute;right:13px;bottom:8px;color:#fff;font-size:19px;font-weight:700;pointer-events:none;
  }

  /* ── layout ── */
  .grid{display:grid;grid-template-columns:1fr 340px;gap:26px;align-items:stretch;}
  @media(max-width:780px){.grid{grid-template-columns:1fr;}}

  .panel{border:1.2px solid var(--line);border-radius:2px;}
  .panel h2{
    background:var(--head);border-bottom:1.2px solid var(--line);
    font-size:17px;font-weight:400;padding:5px 12px;letter-spacing:.5px;
  }

  .left-col{display:flex;flex-direction:column;}
  /* ── to do ── */
  .todo-list{list-style:none;}
  .todo-list li{
    display:flex;align-items:center;gap:12px;padding:11px 14px;
    border-bottom:1px solid var(--line-soft);
  }
  .todo-list li:last-child{border-bottom:none;}
  .todo-list input[type="checkbox"]{
    width:19px;height:19px;accent-color:#555;cursor:pointer;flex-shrink:0;
  }
  .todo-list input[type="text"]{
    flex:1;border:none;outline:none;font-family:'Gaegu',sans-serif;font-size:17px;color:var(--ink);background:transparent;
  }
  .todo-list li.done input[type="text"]{text-decoration:line-through;color:#b5b5b5;}
  .todo-del{border:none;background:none;color:#ccc;cursor:pointer;font-size:16px;visibility:hidden;}
  .todo-list li:hover .todo-del{visibility:visible;}
  .todo-add{
    width:100%;border:none;border-top:1px solid var(--line-soft);background:#fcfcfb;
    padding:7px;font-family:'Gowun Dodum',sans-serif;font-size:12.5px;color:#aaa;cursor:pointer;
  }
  .todo-add:hover{color:var(--ink);}

  /* ── brain dump : dotted grid ── */
  .brain{margin-top:20px;flex:1;display:flex;flex-direction:column;}
  .brain textarea{
    width:100%;flex:1;min-height:300px;border:none;outline:none;resize:none;
    padding:12px 14px;font-family:'Gaegu',sans-serif;font-size:17px;line-height:24px;color:var(--ink);
    background-image:
      repeating-linear-gradient(to right, #e4e4e4 0 1px, transparent 1px 24px),
      repeating-linear-gradient(to bottom, #e4e4e4 0 1px, transparent 1px 24px);
    background-size:24px 24px;
    -webkit-mask-image:none;
  }

  /* ── time plan ── */
  .timeplan table{width:100%;border-collapse:collapse;table-layout:fixed;}
  .timeplan td{border-bottom:1px solid var(--line-soft);height:38px;}
  .timeplan tr:last-child td{border-bottom:none;}
  .timeplan .hour{
    width:44px;text-align:center;font-family:'Gaegu',sans-serif;font-size:19px;
    color:var(--num);border-right:1.2px solid var(--line);
  }
  .timeplan .half-a{border-right:1.2px solid var(--line);} /* solid middle divider */
  .timeplan input{
    width:100%;height:100%;border:none;outline:none;padding:4px 6px;
    font-family:'Gaegu',sans-serif;font-size:15px;color:var(--ink);
    background:
      linear-gradient(to bottom, var(--dot) 50%, transparent 50%) calc(33.33% ) 0/1px 6px repeat-y,
      linear-gradient(to bottom, var(--dot) 50%, transparent 50%) calc(66.66% ) 0/1px 6px repeat-y;
    background-repeat:repeat-y;
  }
  .timeplan input:focus{background-color:#fbfaf0;}
  .timeplan tr.now .hour{background:var(--memo);color:#555;font-weight:700;}

  /* ── sync bar ── */
  .sync{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:22px;
    padding:10px 12px;border:1px dashed var(--line-soft);border-radius:4px;
    font-family:'Gowun Dodum',sans-serif;font-size:12.5px;color:#999;
  }
  .sync .sync-label{font-weight:700;color:#777;letter-spacing:.5px;}
  .sync button,.sync .import-lbl{
    border:1px solid var(--line-soft);background:#fff;border-radius:4px;cursor:pointer;
    font-family:'Gowun Dodum',sans-serif;font-size:12.5px;color:#777;padding:5px 12px;
  }
  .sync button:hover,.sync .import-lbl:hover{background:var(--head);}
  .sync #syncState{margin-left:auto;color:#b5b5b5;}
  @media(max-width:600px){.sync #syncState{margin-left:0;width:100%;}}

  /* ── footer ── */
  .footer{display:flex;justify-content:space-between;align-items:center;margin-top:24px;}
  .credit{font-size:12px;color:#c8c8c8;letter-spacing:2px;font-family:'Gowun Dodum',sans-serif;}
  .print-btn{
    border:1px solid var(--line-soft);background:#fff;font-family:'Gowun Dodum',sans-serif;font-size:13px;
    padding:7px 16px;border-radius:4px;cursor:pointer;color:#777;
  }
  .print-btn:hover{background:var(--head);}


  /* ── iPhone / mobile ── */
  @media(max-width:600px){
    body{padding:10px 6px 40px;}
    .sheet{padding:16px 12px 22px;border-radius:8px;}
    .topbar{gap:8px;}
    .date-label{font-size:22px;}
    .nav-btn{width:36px;height:36px;font-size:16px;}
    .today-btn{padding:0 14px;}
    .weekdays{margin-left:0;width:100%;justify-content:space-between;order:5;font-size:18px;}
    .save-state{position:absolute;right:14px;top:10px;}
    .sheet{position:relative;}
    .memo .quote{font-size:15.5px;padding:9px 10px 0;}
    .memo textarea{font-size:16px;height:78px;}
    .grid{grid-template-columns:1fr;gap:18px;}
    .todo-list li{padding:13px 12px;}
    .todo-list input[type="checkbox"]{width:22px;height:22px;}
    .todo-list input[type="text"]{font-size:16px;}
    .brain textarea{min-height:220px;flex:none;height:240px;font-size:16px;}
    .timeplan td{height:44px;}
    .timeplan .hour{width:40px;font-size:18px;}
    .timeplan input{font-size:16px;padding:6px 7px;}
    .print-btn{padding:10px 18px;}
  }
  @media print{
    body{background:#fff;padding:0;}
    .sheet{box-shadow:none;border:none;max-width:none;padding:8mm;}
    .nav-btn,.today-btn,.print-btn,.todo-add,.todo-del,.save-state{display:none!important;}
  }
</style>
</head>
<body>
<div class="sheet">

  <div class="topbar">
    <span class="date-label">Date.</span>
    <button class="nav-btn" id="prevDay" title="Previous day">&#8249;</button>
    <input type="date" id="dateInput">
    <button class="nav-btn" id="nextDay" title="Next day">&#8250;</button>
    <button class="nav-btn today-btn" id="todayBtn">Today</button>
    <div class="weekdays" id="weekdays">
      <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span class="sun">S</span>
    </div>
    <span class="save-state" id="saveState"></span>
  </div>

  <div class="memo">
    <div class="quote">
      <span class="q-text" id="qText"></span>
      <span class="q-author" id="qAuthor"></span>
      <button class="q-next" id="qNext" title="Show another quote">&#8635;</button>
    </div>
    <textarea id="memo" placeholder=""></textarea>
    <span class="tag">Memo</span>
  </div>

  <div class="grid">
    <div class="left-col">
      <div class="panel">
        <h2>To Do List</h2>
        <ul class="todo-list" id="todoList"></ul>
        <button class="todo-add" id="todoAdd">+ Add item (or press Enter)</button>
      </div>

      <div class="panel brain">
        <h2>Brain Dump</h2>
        <textarea id="brain"></textarea>
              </div>
    </div>

    <div class="panel timeplan">
      <h2>Time Plan</h2>
      <table id="timeTable"></table>
    </div>
  </div>

  <div class="sync">
    <span class="sync-label">iCloud Sync</span>
    <button id="connectBtn" style="display:none">Connect sync file</button>
    <button id="syncReconnect" style="display:none">Reconnect</button>
    <button id="exportBtn">Export</button>
    <label class="import-lbl">Import<input type="file" id="importFile" accept=".json,application/json" hidden></label>
    <span id="syncState"></span>
  </div>

  <div class="footer">
    <span class="credit">PARK'S TIME PLAN</span>
    <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
  </div>
</div>

<script>
(function(){
  // 22 rows: 5AM .. 2AM next day (abs hour 5..26), display ((abs-1)%12)+1
  var ROWS=[]; for(var i=5;i<=26;i++) ROWS.push(i);

  var dateInput=document.getElementById('dateInput');
  var memo=document.getElementById('memo');
  var brain=document.getElementById('brain');
  var todoList=document.getElementById('todoList');
  var table=document.getElementById('timeTable');
  var saveState=document.getElementById('saveState');
  var weekSpans=document.querySelectorAll('#weekdays span');

  // ---- daily quote (time / goals / motivation) ----
  var QUOTES=[
    ["He who controls his time controls his life.","Proverb"],
    ["What gets measured gets managed.","Peter Drucker"],
    ["The key is not to prioritize what's on your schedule, but to schedule your priorities.","Stephen Covey"],
    ["A goal without a plan is just a wish.","Antoine de Saint-Exupery"],
    ["It is not that we have a short time to live, but that we waste a lot of it.","Seneca"],
    ["Never leave that till tomorrow which you can do today.","Benjamin Franklin"],
    ["Success is the sum of small efforts, repeated day in and day out.","Robert Collier"],
    ["How we spend our days is, of course, how we spend our lives.","Annie Dillard"],
    ["A journey of a thousand miles begins with a single step.","Lao Tzu"],
    ["The best way to predict the future is to create it.","Peter Drucker"],
    ["Action is the foundational key to all success.","Pablo Picasso"],
    ["Aim for consistency, not perfection.","Proverb"],
    ["Focusing is about saying no.","Steve Jobs"],
    ["Lost time is never found again.","Benjamin Franklin"],
    ["Well begun is half done.","Aristotle"],
    ["Fortune favors the prepared mind.","Louis Pasteur"],
    ["The best time to plant a tree was 20 years ago. The second best time is now.","African Proverb"],
    ["What matters is direction, not speed.","Goethe"],
    ["Change your habits, change your life.","William James"],
    ["Write down your goals. A dream written down becomes a plan.","Greg Reid"],
    ["Being busy is not the same as being productive.","Tim Ferriss"],
    ["Focus on getting 1% better every day.","James Clear"],
    ["Doing less is the way to do more.","Greg McKeown"],
    ["Your calendar shows your true priorities.","Proverb"],
    ["It does not matter how slowly you go as long as you do not stop.","Confucius"],
    ["Great things are done by a series of small things brought together.","Vincent van Gogh"],
    ["Discipline is choosing between what you want now and what you want most.","Abraham Lincoln"],
    ["Winners manage their time; losers are managed by it.","Proverb"],
    ["Knowing is not enough; we must apply. Willing is not enough; we must do.","Goethe"],
    ["Today's you is the result of yesterday's choices.","Proverb"],
    ["Even the darkest hour has only sixty minutes.","Morris Mandel"],
    ["Don't limit your challenges. Challenge your limits.","Proverb"],
    ["The secret of getting ahead is getting started.","Mark Twain"],
    ["Take care of the minutes and the hours will take care of themselves.","Lord Chesterfield"],
    ["If you want change, live today differently from yesterday.","Proverb"],
    ["By failing to prepare, you are preparing to fail.","Benjamin Franklin"],
    ["Patience is bitter, but its fruit is sweet.","Rousseau"],
    ["Small wins build great confidence.","Proverb"],
    ["They can because they think they can.","Virgil"],
    ["A productive day starts with a clear goal.","Proverb"],
    ["Procrastination is the thief of time.","Edward Young"],
    ["Concentrate all your thoughts upon the work at hand. The sun's rays do not burn until brought to a focus.","Alexander Graham Bell"],
    ["No talent beats consistency.","Proverb"],
    ["If you don't walk today, you'll have to run tomorrow.","Proverb"],
    ["When the goal is clear, the way appears.","Proverb"],
    ["A ship in harbor is safe, but that is not what ships are built for.","John A. Shedd"],
    ["The difference between a successful person and others is a lack of will.","Vince Lombardi"],
    ["Time is the fairest resource of all. The difference lies in how you use it.","Proverb"],
    ["There is no perfect moment to start. The moment is now.","Proverb"],
    ["The future depends on what you do today.","Mahatma Gandhi"]
  ];
  function dailyIndex(){
    var s=dateInput.value, h=0;
    for(var i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}
    return h%QUOTES.length;
  }
  var qOffset=0;
  function showQuote(){
    var q=QUOTES[(dailyIndex()+qOffset)%QUOTES.length];
    document.getElementById('qText').textContent='\u201C'+q[0]+'\u201D';
    document.getElementById('qAuthor').textContent='\u2014 '+q[1];
  }
  document.getElementById('qNext').addEventListener('click',function(){
    qOffset++; showQuote();
  });

  ROWS.forEach(function(abs){
    var disp=((abs-1)%12)+1;
    var h24=abs%24;
    var tip=(h24<10?'0':'')+h24+':00 ~ '+((h24+1)%24<10?'0':'')+((h24+1)%24)+':00';
    var tr=document.createElement('tr');
    tr.dataset.abs=abs;
    tr.innerHTML='<td class="hour" title="'+tip+'">'+disp+'</td>'+
      '<td class="half-a"><input type="text" data-key="t'+abs+'a" title="'+tip.slice(0,5)+' + first 30 min"></td>'+
      '<td class="half-b"><input type="text" data-key="t'+abs+'b" title="last 30 min"></td>';
    table.appendChild(tr);
  });

  var mem={};
  function store(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}
  function load(k){try{return localStorage.getItem(k);}catch(e){return mem[k]||null;}}
  function key(){return 'timeplan-'+dateInput.value;}

  var saveTimer=null;
  function scheduleSave(){
    saveState.textContent='Typing...';
    clearTimeout(saveTimer);
    saveTimer=setTimeout(save,400);
  }
  function save(){
    var todos=[];
    todoList.querySelectorAll('li').forEach(function(li){
      todos.push({text:li.querySelector('input[type=text]').value,
                  done:li.querySelector('input[type=checkbox]').checked});
    });
    var times={};
    table.querySelectorAll('input').forEach(function(inp){if(inp.value)times[inp.dataset.key]=inp.value;});
    store(key(),JSON.stringify({memo:memo.value,brain:brain.value,todos:todos,times:times,savedAt:Date.now()}));
    saveState.textContent='Saved ✓';
    scheduleFileWrite();
  }

  function addTodo(text,done){
    var li=document.createElement('li');
    li.innerHTML='<input type="checkbox"><input type="text"><button class="todo-del" title="Delete">&times;</button>';
    var cb=li.querySelector('[type=checkbox]'),tx=li.querySelector('[type=text]');
    cb.checked=!!done;tx.value=text||'';
    if(done)li.classList.add('done');
    cb.addEventListener('change',function(){li.classList.toggle('done',cb.checked);scheduleSave();});
    tx.addEventListener('input',scheduleSave);
    tx.addEventListener('keydown',function(e){
      if(e.key==='Enter'){addTodo('').querySelector('[type=text]').focus();scheduleSave();}
    });
    li.querySelector('.todo-del').addEventListener('click',function(){li.remove();scheduleSave();});
    todoList.appendChild(li);
    return li;
  }

  function loadDay(){
    var raw=load(key());
    var d=raw?JSON.parse(raw):{};
    memo.value=d.memo||'';
    brain.value=d.brain||'';
    todoList.innerHTML='';
    var todos=(d.todos&&d.todos.length)?d.todos:[{text:'',done:false},{text:'',done:false},{text:'',done:false}];
    todos.forEach(function(t){addTodo(t.text,t.done);});
    table.querySelectorAll('input').forEach(function(inp){
      var v=(d.times&&d.times[inp.dataset.key])||'';
      // migrate old single-cell data (t{abs}) into first half
      if(!v&&d.times&&inp.dataset.key.slice(-1)==='a'){
        v=d.times[inp.dataset.key.slice(0,-1)]||'';
      }
      inp.value=v;
    });
    updateWeekday();
    highlightNow();
    qOffset=0;
    showQuote();
    saveState.textContent=raw?'Loaded':'';
  }

  function updateWeekday(){
    var d=new Date(dateInput.value+'T00:00:00');
    var idx=(d.getDay()+6)%7;
    weekSpans.forEach(function(s,i){s.classList.toggle('on',i===idx);});
  }
  function highlightNow(){
    var now=new Date();
    var isToday=dateInput.value===toISO(now);
    var abs=now.getHours();if(abs<5)abs+=24;
    table.querySelectorAll('tr').forEach(function(tr){
      tr.classList.toggle('now',isToday&&+tr.dataset.abs===abs&&abs>=5&&abs<=26);
    });
  }
  function toISO(d){
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function shiftDay(n){
    var d=new Date(dateInput.value+'T00:00:00');
    d.setDate(d.getDate()+n);
    dateInput.value=toISO(d);
    loadDay();
  }

  memo.addEventListener('input',scheduleSave);
  brain.addEventListener('input',scheduleSave);
  table.addEventListener('input',scheduleSave);
  document.getElementById('todoAdd').addEventListener('click',function(){
    addTodo('').querySelector('[type=text]').focus();scheduleSave();
  });
  dateInput.addEventListener('change',loadDay);
  document.getElementById('prevDay').addEventListener('click',function(){shiftDay(-1);});
  document.getElementById('nextDay').addEventListener('click',function(){shiftDay(1);});
  document.getElementById('todayBtn').addEventListener('click',function(){
    dateInput.value=toISO(new Date());loadDay();
  });


  // ---- iCloud Drive sync (file-based) ----
  var fileHandle=null, fwTimer=null;
  var syncState=document.getElementById('syncState');
  function syncMsg(m){syncState.textContent=m;}

  function idb(){return new Promise(function(res,rej){
    var r=indexedDB.open('timeplan-sync',1);
    r.onupgradeneeded=function(){r.result.createObjectStore('h');};
    r.onsuccess=function(){res(r.result);}; r.onerror=function(){rej(r.error);};
  });}
  function idbSet(k,v){return idb().then(function(db){return new Promise(function(res,rej){
    var t=db.transaction('h','readwrite');t.objectStore('h').put(v,k);
    t.oncomplete=res;t.onerror=function(){rej(t.error);};});});}
  function idbGet(k){return idb().then(function(db){return new Promise(function(res,rej){
    var q=db.transaction('h','readonly').objectStore('h').get(k);
    q.onsuccess=function(){res(q.result);};q.onerror=function(){rej(q.error);};});});}

  function allData(){
    var out={};
    try{
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(k&&k.indexOf('timeplan-')===0){
          try{out[k]=JSON.parse(localStorage.getItem(k));}catch(e){}
        }
      }
    }catch(e){
      for(var k2 in mem){if(k2.indexOf('timeplan-')===0){try{out[k2]=JSON.parse(mem[k2]);}catch(e2){}}}
    }
    return out;
  }
  function mergeData(incoming){
    var changed=0;
    Object.keys(incoming||{}).forEach(function(k){
      if(k.indexOf('timeplan-')!==0)return;
      var inc=incoming[k]; if(!inc)return;
      var curRaw=load(k), cur=null;
      if(curRaw){try{cur=JSON.parse(curRaw);}catch(e){}}
      var iT=inc.savedAt||0, cT=(cur&&cur.savedAt)||0;
      if(!cur||iT>cT){store(k,JSON.stringify(inc));changed++;}
    });
    return changed;
  }
  function payload(){
    return JSON.stringify({type:'timeplan-sync',exported:new Date().toISOString(),data:allData()},null,1);
  }

  // Export / Import (works on PC and iPhone)
  document.getElementById('exportBtn').addEventListener('click',function(){
    var blob=new Blob([payload()],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob); a.download='timeplan-sync.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){URL.revokeObjectURL(a.href);},3000);
    syncMsg('Exported - save it to iCloud Drive');
  });
  document.getElementById('importFile').addEventListener('change',function(e){
    var f=e.target.files[0]; if(!f)return;
    var r=new FileReader();
    r.onload=function(){
      try{
        var j=JSON.parse(r.result);
        var n=mergeData(j.data||j);
        loadDay();
        syncMsg('Imported - '+n+' day(s) updated');
      }catch(err){syncMsg('Import failed: not a valid sync file');}
      e.target.value='';
    };
    r.readAsText(f);
  });

  // Auto-sync via File System Access API (Chrome/Edge on PC)
  function writeToFile(){
    if(!fileHandle)return;
    fileHandle.createWritable().then(function(w){
      return w.write(payload()).then(function(){return w.close();});
    }).then(function(){
      syncMsg('Synced '+new Date().toLocaleTimeString());
    }).catch(function(){syncMsg('Sync write failed');});
  }
  function scheduleFileWrite(){
    if(!fileHandle)return;
    clearTimeout(fwTimer); fwTimer=setTimeout(writeToFile,1200);
  }
  function readFromFile(){
    if(!fileHandle)return Promise.resolve(0);
    return fileHandle.getFile().then(function(f){return f.text();}).then(function(t){
      if(!t||!t.trim())return 0;
      var j=JSON.parse(t); return mergeData(j.data||j);
    }).catch(function(){return 0;});
  }
  if(window.showSaveFilePicker){
    var cBtn=document.getElementById('connectBtn');
    cBtn.style.display='inline-block';
    cBtn.addEventListener('click',function(){
      window.showSaveFilePicker({
        suggestedName:'timeplan-sync.json',
        types:[{description:'TIME PLAN sync file',accept:{'application/json':['.json']}}]
      }).then(function(h){
        fileHandle=h; idbSet('handle',h);
        return readFromFile();
      }).then(function(n){
        if(n)loadDay();
        writeToFile();
        cBtn.textContent='Sync file connected';
      }).catch(function(){});
    });
    // restore previous connection
    idbGet('handle').then(function(h){
      if(!h)return;
      h.queryPermission({mode:'readwrite'}).then(function(p){
        if(p==='granted'){
          fileHandle=h;
          readFromFile().then(function(n){if(n)loadDay(); syncMsg('Sync file connected');});
          cBtn.textContent='Sync file connected';
        }else{
          var rc=document.getElementById('syncReconnect');
          rc.style.display='inline-block';
          rc.addEventListener('click',function(){
            h.requestPermission({mode:'readwrite'}).then(function(p2){
              if(p2==='granted'){
                fileHandle=h;
                readFromFile().then(function(n){if(n)loadDay();});
                rc.style.display='none';
                cBtn.textContent='Sync file connected';
                syncMsg('Sync file connected');
              }
            });
          });
        }
      });
    }).catch(function(){});
    // flush pending write when tab hides/closes
    document.addEventListener('visibilitychange',function(){
      if(document.visibilityState==='hidden'&&fileHandle){clearTimeout(fwTimer);writeToFile();}
    });
  }

  dateInput.value=toISO(new Date());
  loadDay();
  setInterval(highlightNow,60000);
})();
</script>
</body>
</html>
